<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CyberRange Lite · Missions</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Syne:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <a class="brand" href="./index.html">CyberRange <span>Lite</span></a>
        <nav class="nav">
          <a data-nav="index" href="./index.html">Home</a>
          <a data-nav="auth" href="./auth.html">Auth</a>
          <a data-nav="teams" href="./teams.html">Teams</a>
          <a data-nav="missions" href="./missions.html">Missions</a>
          <a data-nav="leaderboard" href="./leaderboard.html">Leaderboard</a>
          <a data-nav="progress" href="./progress.html">Progress</a>
        </nav>
        <div class="auth-chip">
          <span id="auth-dot" class="dot"></span>
          <span id="auth-badge">Guest</span>
        </div>
      </header>

      <main class="page">
        <section class="card">
          <h2>Mission Board</h2>
          <p class="muted">Select any challenge to load details and practice with tracked scoring.</p>
          <div id="scenario-list" class="list"></div>
        </section>

        <section class="grid-2">
          <section class="card">
            <h2>Mission Details</h2>
            <div id="scenario-detail" class="result">
              <p class="muted">Choose a mission from the list to see full briefing.</p>
            </div>
          </section>
          <section class="card">
            <h2>Attempt Console</h2>
            <label>
              Attempt scope
              <select id="team-select">
                <option value="">No team (individual)</option>
              </select>
            </label>
            <form id="attempt-form">
              <label>
                Payload
                <textarea id="payload" rows="5" required placeholder="Paste payload"></textarea>
              </label>
              <label>
                Evidence
                <textarea id="evidence" rows="4" placeholder="Describe output/observations"></textarea>
              </label>
              <button type="submit">Submit Attempt</button>
            </form>
            <div id="result" class="result"></div>
          </section>
        </section>
      </main>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="./js/missions.js" type="module"></script>
  </body>
</html>
